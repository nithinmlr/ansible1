---
- name: Join Windows Host to Active Directory
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: false

  tasks:
    - name: Join host to domain with automatic reboot
      microsoft.ad.membership:
        dns_domain_name: "{{ dns_domain_name }}"
        domain_admin_user: "{{ domain_admin_user }}"
        domain_admin_password: "{{ domain_admin_password }}"
        domain_ou_path: "{{ target_ou_path }}"
        state: domain
        reboot: true
      register: domain_join_result

    - name: Debug domain join status
      ansible.builtin.debug:
        msg: "Reboot was required: {{ domain_join_result.reboot_required }}"
      when: domain_join_result.reboot_required is defined

