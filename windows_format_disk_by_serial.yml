---
- name: Format Disk by Serial Number (Windows AWX)
  hosts: all
  gather_facts: false
  tasks:

    - name: Validate required input
      ansible.builtin.fail:
        msg: "target_serial must be provided via AWX survey or extra_vars."
      when: target_serial | length == 0

    - name: Gather disk facts
      ansible.windows.win_disk_facts:

    - name: Find disk matching serial number
      ansible.builtin.set_fact:
        target_disk_number: "{{ item.number }}"
      loop: "{{ ansible_facts.disks }}"
      when:
        - item.serial_number is defined
        - item.serial_number | trim == target_serial | trim
        - target_disk_number is not defined

    - name: Fail if serial not found
      ansible.builtin.fail:
        msg: "Disk with serial {{ target_serial }} not found."
      when: target_disk_number is not defined

    - name: Ensure disk is online
      ansible.windows.win_disk:
        disk_number: "{{ target_disk_number }}"
        state: online

    - name: Initialize disk (GPT)
      ansible.windows.win_disk:
        disk_number: "{{ target_disk_number }}"
        partition_style: gpt

    - name: Create partition (consume full disk)
      ansible.windows.win_partition:
        disk_number: "{{ target_disk_number }}"
        drive_letter: "{{ input_drive_letter | default(omit) }}"
        partition_size: -1
        state: present
      register: partition_result

    - name: Set drive letter fact
      ansible.builtin.set_fact:
        final_drive_letter: >-
          {{ input_drive_letter if input_drive_letter | length > 0
             else partition_result.drive_letter }}

    - name: Format partition
      ansible.windows.win_format:
        drive_letter: "{{ final_drive_letter }}"
        file_system: "{{ input_fstype }}"
        new_label: "{{ input_label }}"
        full: false

    - name: Debug summary
      ansible.builtin.debug:
        msg:
          - "Disk Number: {{ target_disk_number }}"
          - "Drive Letter: {{ final_drive_letter }}"
          - "Filesystem: {{ input_fstype }}"
          - "Label: {{ input_label }}"
          - "Serial: {{ target_serial }}"
``
