---
- name: Initialize and Format Windows Disk by Serial
  hosts: all
  gather_facts: false
  tasks:
    - name: Gather disk facts
      community.windows.win_disk_facts:
      register: disk_results
    - name: Set disk number based on serial
      set_fact:
        target_disk_number: "{{ item.number }}"
      loop: "{{ ansible_facts.disks }}"
      when: 
        - item.serial_number == target_serial
        - item.partition_style == 'RAW'
      no_log: true

    - name: Fail if disk serial not found
      fail:
        msg: "Disk with serial {{ target_serial }} was not found or is not in RAW state."
      when: target_disk_number is not defined

    - name: Initialize disk with GPT
      community.windows.win_initialize_disk:
        disk_number: "{{ target_disk_number }}"
        style: gpt
        online: true

    - name: Create partition using full disk
      community.windows.win_partition:
        disk_number: "{{ target_disk_number }}"
        drive_letter: "{{ input_drive_letter | default('auto') }}"
        partition_size: -1
        state: present
      register: partition_info  

    - name: Format the volume
      community.windows.win_format:
        drive_letter: "{{ input_drive_letter | default(partition_info.drive_letter) }}"
        file_system: "{{ input_fstype }}"
        new_label: "{{ input_label }}"
        full: false
